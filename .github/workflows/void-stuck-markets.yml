name: Void Stuck Markets

on:
  schedule:
    # Every 6 hours. Sweeps markets that have been oracleStatus=FAILED for
    # more than 24h and refunds all open positions at cost, flipping the
    # market to VOIDED. This keeps user stakes from being trapped when the
    # scraper fails to write finalPrice.
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  void-stuck-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger void-stuck-markets
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/void-stuck-markets")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Void-stuck-markets failed with status $http_code"
            exit 1
          fi
