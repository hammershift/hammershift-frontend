name: Create Tournaments

on:
  schedule:
    # Mon/Tue/Thu/Fri at 8:00 AM ET (12:00 UTC).
    # Four runs/week keeps active-tournament count from dropping to zero
    # between runs when previous tournaments end on short BaT deadlines.
    - cron: '0 12 * * 1,2,4,5'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  create-tournaments:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tournament creation
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/create-tournaments")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Tournament creation failed with status $http_code"
            exit 1
          fi
